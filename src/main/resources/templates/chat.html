<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>Chat</title>
	<script src="/app.js"></script>
</head>
<body>
	<h1>Chat</h1>
		<div>
			<p><span th:text="${session.userName}"></span>, let's talk with: <span th:text="${session.receiverName}"></span></p>
		</div>
		<div>
			<input type="button" value="connect" onclick="connectBtn()">
			<input type="button" value="disconnect" onclick="disconnectBtn()">
		</div>
		<div>
			<input type="search" name="messageInput" id="search", placeholder="Type a message..">
			<input type="button" value="send" onclick="sendBtn()">
		</div>
</body>
</html>
