<!DOCTYPE html>
<head>
	<meta charset="UTF-8">
	<title>Chat</title>
	<link th:href="@{/style/common.css}" rel="stylesheet">
	<link th:href="@{/style/chat.css}" rel="stylesheet">
	<script xmlns:th="http://www.thymeleaf.org"></script>
	<script src="https://cdn.jsdelivr.net/npm/sockjs-client/dist/sockjs.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs/bundles/stomp.umd.min.js"></script>
</head>
<body>
	<div class="chat">
		<div class="header">
			<!-- form starts here -->
			<form th:action="@{/returntomypage}" method="post">
				<button id="disconnect" onclick="disconnectBtn()" class="disconnect-btn btn--white">＜</button>
			</form>
			<!-- form endss here -->
			<h2 id="receiverName">[[${receiverName}]]</h2> 
		</div>
		<!-- message input area -->
		<div class="message-container"></div>
		<div class="input-container">
			<input type="search" name="messageInput" id="search" class="form-control" placeholder="Type a message..">
			<button type="submit" id="send" onclick="sendBtn()" class="send-btn btn--orange">Send</button>
		</div>
	</div>
</body>
<script type="text/javascript">
	const message = document.querySelector('.message-container');
	
	const stompClient = new StompJs.Client({
		webSocketFactory: () => new SockJS('/ws')
	});
	
	//Activate connection
	stompClient.activate();
	
	stompClient.onConnect = (frame) => {
		console.log('Connected: ' + frame);
		//Recieve message
		stompClient.subscribe('/user/queue/chat',(msg) => {
			const body = JSON.parse(msg.body);
			//Show message on receiver's screen
			message.innerHTML += `
				<div class="message receiver-message">
					${body.sender}: ${body.text}
				</div>`;
		});
	};
	
	stompClient.onWebSocketError = (error) => {
	    console.error('Error with websocket', error);
	};
	
	stompClient.onStompError = (frame) => {
	    console.error('Broker reported error: ' + frame.headers['message']);
	    console.error('Additional details: ' + frame.body);
	};
	
	//Set enter key event for search button
	const send = document.getElementById('search');
	send.addEventListener("keydown", function(event)  {
	    if (event.key === 'Enter') {
	        console.log('Enter key was pressed')
	        sendBtn()
	    }
	})
	
	function sendBtn(){	
		const receiver = document.getElementById('receiverName').innerText.trim();
		const msg = document.getElementById('search').value;
		//Send message
		stompClient.publish({
			destination: '/app/chat',
			body: JSON.stringify({receiver: receiver, text: msg})
		});
		console.log('send:' + msg);
		//Show message to chat area
		message.innerHTML += `
			<div class="message sender-message">
				You:${msg}
			</div>`;
	}

	function disconnectBtn(){
		stompClient.deactivate();
		console.log("Disconnected");
	}
</script>
</html>
